<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Student Data</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4F46E5; --bg: #F3F4F6; --card: #FFFFFF; --text: #111827; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px 20px; }
        .container { max-width: 800px; margin: auto; }
        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: white; padding: 15px 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .nav-links a { margin-left: 20px; text-decoration: none; color: #6B7280; font-weight: 600; }
        .nav-links a.active { color: var(--primary); }
        .card { background: var(--card); padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: span 2; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #E5E7EB; border-radius: 8px; font-family: 'Inter'; background: #F9FAFB; box-sizing: border-box; }
        button { grid-column: span 2; background: var(--primary); color: white; padding: 14px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .result-card { margin-top: 30px; padding: 24px; border-radius: 12px; border-left: 6px solid; }
        .at-risk { background: #FEF2F2; color: #991B1B; border-color: #F87171; }
        .on-track { background: #F0FDF4; color: #166534; border-color: #4ADE80; }
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <h2 style="margin:0; font-size: 20px;">Educator Portal</h2>
        <div class="nav-links">
            <a href="{% url 'teacher_dashboard' %}">All Students</a>
            <a href="{% url 'high_risk' %}">⚠️ High Risk</a>
            <a href="{% url 'add_student' %}" class="active">+ Add Student</a>
            <a href="{% url 'logout' %}">Logout</a>
        </div>
    </div>
    <div class="card">
        <h3 style="margin-top:0;">Run AI Prediction & Save Data</h3>
        <form method="POST" class="form-grid">
            {% csrf_token %}
            <div class="full-width"><label>Student Email Address</label><input type="email" name="name" placeholder="must match student login email" required></div>
            <div><label>Attendance Rate (%)</label><input type="number" name="attendance" step="0.1" required></div>
            <div><label>Study Hours (Per Week)</label><input type="number" name="study_hours" step="0.5" required></div>
            <div><label>Online Courses Completed</label><input type="number" name="online_courses" step="1" required></div>
            <div><label>Assignment Completion (%)</label><input type="number" name="assignment_rate" step="0.1" required></div>
            <div class="full-width">
                <label>Preferred Learning Style</label>
                <select name="learning_style" required>
                    <option value="Visual">Visual</option>
                    <option value="Auditory">Auditory</option>
                    <option value="Reading/Writing">Reading/Writing</option>
                    <option value="Kinesthetic">Kinesthetic</option>
                </select>
            </div>
            <button type="submit">Analyze & Add to Roster</button>
        </form>
        {% if result %}
            <div class="result-card {% if result == 'At Risk' %}at-risk{% else %}on-track{% endif %}">
                <h3 style="margin-top:0;">Prediction: {{ result }}</h3>
                <p style="margin-bottom:0;"><strong>System Note:</strong> {{ intervention }}</p>
            </div>
        {% endif %}
    </div>
</div>
</body>
</html>
